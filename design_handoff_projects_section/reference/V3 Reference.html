<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>V3 — Projects Section (standalone reference)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles/tokens.css" />
<style>
  html, body { margin: 0; height: 100%; background: #050504; }
  /* The design is a fixed editorial frame. This reference centres it and
     scales it to fit any viewport — it is NOT responsive logic to copy;
     implement the real component in your app's layout. */
  #wrap { position: fixed; inset: 0; display: grid; place-items: center; overflow: hidden; }
  #frame { width: 1180px; height: 760px; flex: 0 0 auto; }
</style>
</head>
<body>
<div id="wrap"><div id="frame"><div id="root"></div></div></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="data/projects.js"></script>
<script type="text/babel" src="variations/Shell.jsx"></script>
<script type="text/babel" src="variations/DemoVideo.jsx"></script>
<script type="text/babel" src="variations/V3Journey.jsx"></script>
<script type="text/babel">
  // Auto-fit the 1180×760 frame to the viewport (reference convenience only).
  function fit() {
    const f = document.getElementById('frame');
    const s = Math.min(window.innerWidth / 1180, window.innerHeight / 760, 1);
    f.style.transform = 'scale(' + s + ')';
  }
  window.addEventListener('resize', fit); fit();
  const V3Journey = window.V3Journey;
  ReactDOM.createRoot(document.getElementById('root')).render(<V3Journey />);
</script>
</body>
</html>
