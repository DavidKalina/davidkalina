<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Project Card — Side Quests</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="project-card.css" />
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #050505;
    color: #e8e6e1;
    font-family: "JetBrains Mono", ui-monospace, monospace;
  }
  /* Tweaks panel */
  #tweaks-panel {
    position: fixed;
    right: 16px;
    bottom: 16px;
    width: 260px;
    background: #0e0e10;
    border: 1px solid #2a2721;
    color: #e8e6e1;
    font-family: "JetBrains Mono", ui-monospace, monospace;
    font-size: 11px;
    padding: 14px 16px;
    z-index: 9999;
    display: none;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  }
  #tweaks-panel.open { display: block; }
  #tweaks-panel h3 {
    margin: 0 0 12px;
    font-size: 10px;
    letter-spacing: 0.2em;
    color: #8b857a;
    font-weight: 400;
  }
  #tweaks-panel .row { margin-bottom: 12px; }
  #tweaks-panel label { display: block; color: #8b857a; margin-bottom: 4px; font-size: 9.5px; letter-spacing: 0.15em; }
  #tweaks-panel .swatches { display: flex; gap: 6px; }
  #tweaks-panel .swatch {
    width: 22px; height: 22px; border: 1px solid #2a2721;
    cursor: pointer; border-radius: 2px;
  }
  #tweaks-panel .swatch.active { outline: 1px solid #e8e6e1; outline-offset: 2px; }
  #tweaks-panel .seg {
    display: flex; border: 1px solid #2a2721;
  }
  #tweaks-panel .seg button {
    flex: 1; background: transparent; color: #8b857a; border: 0;
    padding: 6px; font-family: inherit; font-size: 10px;
    cursor: pointer; letter-spacing: 0.1em;
  }
  #tweaks-panel .seg button.active { background: #1a1a1c; color: #e8e6e1; }
</style>
</head>
<body>

<div id="root"></div>

<div id="tweaks-panel">
  <h3>TWEAKS</h3>
  <div class="row">
    <label>ACCENT</label>
    <div class="swatches" id="tw-accents"></div>
  </div>
  <div class="row">
    <label>DENSITY</label>
    <div class="seg" id="tw-density">
      <button data-v="comfortable" class="active">COMFORTABLE</button>
      <button data-v="compact">COMPACT</button>
    </div>
  </div>
  <div class="row">
    <label>VARIANT FOCUS</label>
    <div class="seg" id="tw-focus">
      <button data-v="all" class="active">BOTH</button>
      <button data-v="v1">V1</button>
      <button data-v="v2">V2</button>
    </div>
  </div>
</div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="project-card-components.jsx"></script>
<script type="text/babel" src="variant-1.jsx"></script>
<script type="text/babel" src="variant-2.jsx"></script>

<script type="text/babel" data-presets="react">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "#f5a25d",
  "density": "comfortable",
  "focus": "v2"
}/*EDITMODE-END*/;

const PROJECT = {
  index: "04",
  title: "Side Quests",
  description: (
    <span>
      A mobile app helping people with social anxiety and habitual homebodies build the confidence and routine to get out, explore their interests, and find community. Agentic AI workflow combines guided onboarding with Google Places data to generate personalized, low-pressure activities. Targeting TestFlight beta April 2026.
    </span>
  ),
  tags: ["react-native", "typescript", "ai-agents", "mcp", "google-places"],
};

function App() {
  const [tweaks, setTweaks] = React.useState(TWEAK_DEFAULTS);

  React.useEffect(() => {
    document.documentElement.style.setProperty("--pc-accent", tweaks.accent);
    // glow color derived
    const hex = tweaks.accent.replace("#","");
    const r = parseInt(hex.slice(0,2),16);
    const g = parseInt(hex.slice(2,4),16);
    const b = parseInt(hex.slice(4,6),16);
    document.documentElement.style.setProperty("--pc-accent-glow", `rgba(${r},${g},${b},0.18)`);
    document.querySelectorAll(".pc-card").forEach(el => el.setAttribute("data-density", tweaks.density));
  }, [tweaks]);

  // Edit mode wiring
  React.useEffect(() => {
    const onMsg = (e) => {
      if (!e.data || typeof e.data !== "object") return;
      if (e.data.type === "__activate_edit_mode") {
        document.getElementById("tweaks-panel").classList.add("open");
      } else if (e.data.type === "__deactivate_edit_mode") {
        document.getElementById("tweaks-panel").classList.remove("open");
      }
    };
    window.addEventListener("message", onMsg);
    try { window.parent.postMessage({ type: "__edit_mode_available" }, "*"); } catch {}
    return () => window.removeEventListener("message", onMsg);
  }, []);

  // Wire up controls imperatively (they live outside React root)
  React.useEffect(() => {
    const accents = ["#f5a25d", "#d97757", "#6ea8ff", "#8fd694", "#c9a8f5"];
    const wrap = document.getElementById("tw-accents");
    wrap.innerHTML = "";
    accents.forEach(c => {
      const b = document.createElement("div");
      b.className = "swatch" + (c === tweaks.accent ? " active" : "");
      b.style.background = c;
      b.onclick = () => {
        const next = { ...tweaks, accent: c };
        setTweaks(next);
        try { window.parent.postMessage({ type: "__edit_mode_set_keys", edits: { accent: c } }, "*"); } catch {}
      };
      wrap.appendChild(b);
    });
    document.querySelectorAll("#tw-density button").forEach(btn => {
      btn.onclick = () => {
        const v = btn.dataset.v;
        const next = { ...tweaks, density: v };
        setTweaks(next);
        document.querySelectorAll("#tw-density button").forEach(b => b.classList.toggle("active", b === btn));
        try { window.parent.postMessage({ type: "__edit_mode_set_keys", edits: { density: v } }, "*"); } catch {}
      };
      btn.classList.toggle("active", btn.dataset.v === tweaks.density);
    });
    document.querySelectorAll("#tw-focus button").forEach(btn => {
      btn.onclick = () => {
        const v = btn.dataset.v;
        const next = { ...tweaks, focus: v };
        setTweaks(next);
        document.querySelectorAll("#tw-focus button").forEach(b => b.classList.toggle("active", b === btn));
        try { window.parent.postMessage({ type: "__edit_mode_set_keys", edits: { focus: v } }, "*"); } catch {}
      };
      btn.classList.toggle("active", btn.dataset.v === tweaks.focus);
    });
  }, [tweaks]);

  const showV1 = tweaks.focus === "all" || tweaks.focus === "v1";
  const showV2 = tweaks.focus === "all" || tweaks.focus === "v2";

  return (
    <DesignCanvas title="Side Quests · project card" subtitle="2 directions — same data, same aesthetic">
      <DCSection id="variations" title="Variations">
        {showV1 && (
          <DCArtboard id="v1" label="V1 · ASCII Architecture Diagram" width={1180} height={560}>
            <V1 data={PROJECT} />
          </DCArtboard>
        )}
        {showV2 && (
          <DCArtboard id="v2" label="V2 · Annotated Tech + User Journey" width={1180} height={560}>
            <V2 data={PROJECT} />
          </DCArtboard>
        )}
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

</body>
</html>
